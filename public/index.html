<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

    <style type="text/tailwindcss">
      * { -webkit-font-smoothing: antialiased; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes checkPop {
        0%   { transform: scale(1); }
        40%  { transform: scale(0.8); }
        70%  { transform: scale(1.1); }
        100% { transform: scale(1); }
      }

      .fade-in { animation: fadeIn 0.45s cubic-bezier(0.22,1,0.36,1) both; }

      .checkbox-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 10px;
        border: 1px solid #e5e5e5;
        background: #ffffff;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.12s;
        position: relative;
      }
      .checkbox-cell:hover {
        background: #f5f5f7;
        border-color: #c7c7cc;
        transform: scale(1.07);
      }
      .checkbox-cell:has(input:checked) {
        background: #f5f5f7;
        border-color: #1d1d1f;
      }
      .checkbox-cell input {
        width: 17px;
        height: 17px;
        cursor: pointer;
        accent-color: #1d1d1f;
      }
      .checkbox-cell input:checked {
        animation: checkPop 0.25s ease-out;
      }

      #errorBox {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 59, 48, 0.92);
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 0.875rem;
        display: none;
        z-index: 1000;
        white-space: nowrap;
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#f5f5f7] text-[#1d1d1f]">

    <!-- Top bar -->
    <header class="fade-in bg-white/80 backdrop-blur-xl border-b border-black/[0.07] sticky top-0 z-50">
      <div class="max-w-5xl mx-auto px-6 py-3.5 flex items-center justify-between gap-4">

        <!-- Brand -->
        <div class="flex items-center gap-2.5">
          <div class="w-7 h-7 rounded-lg bg-black flex items-center justify-center shrink-0">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="text-sm font-semibold tracking-tight text-[#1d1d1f]">Checkbox</span>
        </div>

        <!-- User info -->
        <div id="userInfo" class="hidden items-center gap-3">

          <!-- Checked count pill -->
          <div class="hidden sm:flex items-center gap-1.5 text-xs font-medium">
            <span class="px-2.5 py-1 rounded-full bg-[#f5f5f7] text-[#6e6e73] border border-black/[0.07] tabular-nums">
              <span id="checkedCount">0</span> / <span id="totalCount">0</span> checked
            </span>
          </div>

          <!-- Divider -->
          <div class="w-px h-5 bg-black/10 hidden sm:block"></div>

          <!-- Avatar + name -->
          <div class="flex items-center gap-2.5">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-[#1d1d1f] flex items-center justify-center text-xs font-semibold text-white shrink-0 overflow-hidden">
              <span id="avatarInitials">?</span>
            </div>
            <div class="leading-tight hidden md:block">
              <p id="userName" class="text-sm font-medium text-[#1d1d1f] leading-none">—</p>
              <p id="userEmail" class="text-xs text-[#6e6e73] leading-none mt-0.5 truncate max-w-[180px]">—</p>
            </div>
          </div>

          <!-- Sign out -->
          <button onclick="signOut()" class="text-xs text-[#6e6e73] hover:text-red-500 transition-colors px-2.5 py-1 rounded-lg hover:bg-red-50 cursor-pointer font-medium">
            Sign out
          </button>
        </div>

        <!-- Fallback if not logged in -->
        <div id="notLoggedIn" class="text-xs text-[#6e6e73]">Not signed in</div>

      </div>
    </header>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-6 py-10">

      <!-- Page heading -->
      <div class="fade-in mb-8" style="animation-delay:0.05s">
        <h1 class="text-2xl font-semibold text-[#1d1d1f] tracking-tight">Checkboxes</h1>
        <p class="text-sm text-[#6e6e73] mt-1">Real-time shared state — changes sync instantly.</p>
      </div>

      <!-- Checkbox grid -->
      <div class="fade-in" style="animation-delay:0.1s">
        <div
          id="container"
          class="grid gap-2"
          style="grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));"
        ></div>
      </div>

    </main>

    <!-- Error box -->
    <div id="errorBox"></div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      /* ─── User info ─────────────────────────────── */
      const stored = localStorage.getItem('userDetails');

        const token = localStorage.getItem("token");
      const userDetails = JSON.parse(
        localStorage.getItem("userDetails") || "null",
      );

      if (!token || !userDetails) {
        window.location.href = "login.html";
      }
      if (stored) {
        try {
          const user = JSON.parse(stored);
          document.getElementById('userInfo').classList.remove('hidden');
          document.getElementById('userInfo').classList.add('flex');
          document.getElementById('notLoggedIn').classList.add('hidden');

          const name  = user.displayName || user.name || 'User';
          const email = user.email || '';
          const photo = user.photoURL || user.photo || '';

          document.getElementById('userName').textContent  = name;
          document.getElementById('userEmail').textContent = email;

          const initials = name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
          document.getElementById('avatarInitials').textContent = initials;

          if (photo) {
            const img = document.createElement('img');
            img.src = photo;
            img.className = 'w-8 h-8 rounded-full object-cover';
            img.alt = name;
            const avatarEl = document.getElementById('userAvatar');
            avatarEl.innerHTML = '';
            avatarEl.appendChild(img);
          }
        } catch(e) {}
      }

      function signOut() {
        localStorage.removeItem('token');
        localStorage.removeItem('userDetails');
        window.location.href = 'login.html';
      }

      /* ─── Stats helpers ─────────────────────────── */
      function updateStats() {
        const inputs = document.querySelectorAll('#container input[type="checkbox"]');
        const total   = inputs.length;
        const checked = [...inputs].filter(i => i.checked).length;

        document.getElementById('checkedCount').textContent = checked;
        document.getElementById('totalCount').textContent   = total;
      }

      /* ─── Socket & fetch (original JS — untouched) ─ */
      const socket = io();
      const container = document.getElementById("container");

      socket.on("server:checkbox:change", (data) => {
        console.log(`Socket Server Event`, data);
        const { index, checked } = data;
        console.log("adcsv", data);
        const input = document.getElementById(`checkbox-${index}`);
        console.log("inputinput", input);
        if (input) {
          input.checked = checked;
          updateStats();
        }
      });

      async function fetchServer() {
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        const response = await fetch("/api/checkbox", { method: "GET" });
        console.log("dczv", response);
        const data = await response.json();
        console.log("wdcvs", data);

        if (data && data.data.checkboxes) {
          data.data.checkboxes.forEach((value, index) => {
            const cell  = document.createElement("div");
            cell.className = "checkbox-cell";

            const label = document.createElement("label");
            label.htmlFor = `checkbox-${index}`;
            label.style.cssText = "position:absolute;inset:0;cursor:pointer;";

            const input = document.createElement("input");
            input.type    = "checkbox";
            input.id      = `checkbox-${index}`;
            input.checked = value;
            input.addEventListener("change", (event) => {
              const checked = event.target.checked;
              socket.emit("client:checkbox:change", { index, checked });
              fetchServer();
            });

            cell.appendChild(input);
            cell.appendChild(label);
            container.appendChild(cell);
          });

          updateStats();
        }
      }

      window.addEventListener("load", async () => {
        fetchServer();
      });

      const errorBox = document.getElementById("errorBox");
      socket.on("server:error", (data) => {
        const errorMessage = data.error;
        errorBox.textContent = errorMessage;
        errorBox.style.display = "block";
        setTimeout(() => {
          errorBox.style.display = "none";
        }, 3000);
      });
    </script>
  </body>
</html>
